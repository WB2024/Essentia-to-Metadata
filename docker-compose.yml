services:
  essentia-tagger:
    build: .
    volumes:
      - ${MUSIC_DIR:-./music}:/music
    # Override CMD via environment or command
    # Examples:
    #   docker compose run essentia-tagger /music --auto --dry-run
    #   docker compose run essentia-tagger /music/song.flac --auto --single-file
    profiles: ["cpu"]

  essentia-tagger-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    volumes:
      - ${MUSIC_DIR:-./music}:/music
    networks:
      - essentia_net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    profiles: ["gpu"]

networks:
  essentia_net:
    driver: bridge
